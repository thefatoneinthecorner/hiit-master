<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HIIT Master</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #ffffff;
      --work-red: #d32f2f;
      --rest-green: #388e3c;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-color); color: var(--text-color);
      height: 100vh; overflow: hidden;
      font-variant-numeric: tabular-nums;
      -webkit-font-feature-settings: "tnum";
      font-feature-settings: "tnum";
    }

    #launchpad, #run-view { display: flex; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; }

    /* --- LAUNCHPAD --- */
    #launchpad { align-items: center; justify-content: center; padding: 20px; }
    .d-pad { display: grid; grid-template-columns: 80px 150px 80px; grid-template-rows: 80px 100px 80px; gap: 10px; align-items: center; justify-items: center; }
    .goal-display { grid-column: 2; grid-row: 2; font-size: 90px; font-weight: 800; }
    #north { grid-column: 2; grid-row: 1; }
    #south { grid-column: 2; grid-row: 3; }
    #west { grid-column: 1; grid-row: 2; }
    #east { grid-column: 3; grid-row: 2; }

    .btn-arrow { background: #333; border: none; color: white; border-radius: 15px; width: 80px; height: 80px; font-size: 32px; cursor: pointer;}
    .btn-arrow:active { background: #555; }
    .btn-arrow:disabled { opacity: 0.1; cursor: default; }
    .session-info { margin-top: 20px; font-size: 18px; color: #888; min-height: 1.5em; }
    .start-btn { margin-top: 40px; padding: 25px 80px; font-size: 28px; font-weight: bold; background: var(--rest-green); border: none; color: white; border-radius: 50px; min-width: 220px; cursor: pointer;}
    .start-btn:active { transform: scale(0.95); opacity: 0.8; }

    /* --- RUN VIEW --- */
    #run-view { display: none; padding: 60px 20px 40px 20px; transition: background 0.3s ease; z-index: 10; }
    .run-header { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 10px; opacity: 0.9; }
    .main-timer { font-size: 160px; font-weight: 900; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
    .phase-label { font-size: 36px; font-weight: bold; text-align: center; letter-spacing: 6px; margin-bottom: 30px; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .control-btn { padding: 20px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; color: white; background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); cursor: pointer;}
    #ff-btn { position: absolute; top: 40px; right: 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); padding: 12px 18px; border-radius: 10px; color: white; font-size: 16px; z-index: 100; cursor: pointer;}
    #ff-btn:active { background: rgba(255,255,255,0.2); }

    /* --- LANDSCAPE MODE --- */
    @media (orientation: landscape) and (max-height: 600px) {
      #launchpad { flex-direction: row; justify-content: space-evenly; padding: 10px; }
      .d-pad { grid-template-columns: 60px 100px 60px; grid-template-rows: 60px 80px 60px; }
      .btn-arrow { width: 60px; height: 60px; font-size: 24px; }
      .goal-display { font-size: 70px; }
      #launchpad > .start-btn, #launchpad > .session-info, #launchpad > button { margin-top: 10px; }

      #run-view { padding: 15px 20px; justify-content: center; }
      #ff-btn { top: 15px; right: 20px; padding: 8px 12px; font-size: 14px; }
      .run-header { font-size: 18px; margin-bottom: 5px; }
      .main-timer { font-size: 110px; flex-grow: 0; margin: 5px 0; }
      .phase-label { font-size: 24px; margin-bottom: 15px; letter-spacing: 4px; }
      .controls { gap: 15px; }
      .control-btn { padding: 12px; font-size: 16px; }
    }
  </style>
</head>
<body>

<div id="launchpad">
  <div class="d-pad">
    <button class="btn-arrow" id="north">▲</button>
    <button class="btn-arrow" id="south">▼</button>
    <button class="btn-arrow" id="west">◀</button>
    <button class="btn-arrow" id="east">▶</button>
    <div class="goal-display" id="goal-val">20</div>
  </div>
  <div class="session-info" id="session-info">New Session</div>
  <button class="start-btn" id="start-btn">START</button>
  <button onclick="exportCSV()" style="margin-top:20px; background:none; border:none; color:#555; text-decoration:underline; font-size:16px; cursor:pointer;">Export CSV</button>
</div>

<div id="run-view">
  <button id="ff-btn">⏩ Skip</button>
  <div class="run-header" id="cycle-count">1 / 15</div>
  <div class="main-timer" id="timer-display">05:00</div>
  <div class="phase-label" id="phase-name">WARMUP</div>
  <div class="controls">
    <button class="control-btn" id="pause-btn">PAUSE</button>
    <button class="control-btn" id="return-btn">RETURN</button>
  </div>
</div>

<script>
  // --- DATA & CONFIG ---
  const urlParams = new URLSearchParams(window.location.search);

  // Default sequence
  let RESTS = [300, 80, 65, 55, 45, 40, 35, ...Array(8).fill(30)];

  // Override via query param
  if (urlParams.has('rests')) {
    const parsed = urlParams.get('rests').split(',').map(Number).filter(n => !isNaN(n));
    if (parsed.length > 0) RESTS = parsed;
  }

  let history = JSON.parse(localStorage.getItem('hiit_history') || '[]');
  let hIdx = -1;
  let workGoal = history.length > 0 ? history[history.length-1].goal : 20;

  let curCycle = 0;
  let timeLeft = 0;
  let isPaused = false;
  let isWorkPhase = false;
  let isCooldown = false;
  let timer = null;
  let audioCtx = null;

  // UI REFS (The ones that went missing!)
  const goalEl = document.getElementById('goal-val');
  const infoEl = document.getElementById('session-info');
  const startBtn = document.getElementById('start-btn');
  const ffBtn = document.getElementById('ff-btn');

  // Dev Mode Toggle
  if (!urlParams.has('show_skip')) {
    ffBtn.style.display = 'none';
  }

  // --- AUDIO ---
  const playTone = (freq, len) => {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + len);
    osc.start(); osc.stop(audioCtx.currentTime + len);
  };

  // --- UI UPDATES ---
  const updateLaunch = () => {
    if (hIdx === -1) {
      goalEl.innerText = workGoal;
      infoEl.innerText = history.length === 0 ? "First Session" : "New Session";
      document.getElementById('north').disabled = false;
      document.getElementById('south').disabled = false;
    } else {
      goalEl.innerText = history[hIdx].goal;
      const d = new Date(history[hIdx].date);
      infoEl.innerText = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      document.getElementById('north').disabled = true;
      document.getElementById('south').disabled = true;
    }
    document.getElementById('east').disabled = (hIdx === -1);
    document.getElementById('west').disabled = (history.length === 0 || hIdx === 0);
  };

  // --- LISTENERS ---
  document.getElementById('north').onclick = () => { workGoal++; updateLaunch(); };
  document.getElementById('south').onclick = () => { if(workGoal > 5) workGoal--; updateLaunch(); };
  document.getElementById('west').onclick = () => { if(hIdx === -1) hIdx = history.length-1; else hIdx--; updateLaunch(); };
  document.getElementById('east').onclick = () => { if(hIdx < history.length-1) hIdx++; else hIdx = -1; updateLaunch(); };

  startBtn.onclick = () => {
    if(hIdx !== -1) workGoal = history[hIdx].goal;
    let countdown = 3;
    startBtn.innerText = countdown;
    const prep = setInterval(() => {
      playTone(440, 0.1);
      countdown--;
      if(countdown > 0) startBtn.innerText = countdown;
      else {
        clearInterval(prep);
        playTone(880, 0.5);
        startBtn.innerText = "START";
        initRun();
      }
    }, 1000);
    playTone(440, 0.1);
  };

  const initRun = async () => {
    document.getElementById('launchpad').style.display = 'none';
    document.getElementById('run-view').style.display = 'flex';

    history.push({
      date: new Date().toISOString(),
      goal: workGoal,
      rests: RESTS
    });
    localStorage.setItem('hiit_history', JSON.stringify(history));

    curCycle = 0;
    isWorkPhase = false; // Always start in a Rest (Warmup)
    isCooldown = false;
    timeLeft = RESTS[0];

    try { await navigator.wakeLock.request('screen'); } catch(e){}
    timer = setInterval(tick, 1000);
    render();
  };

  const tick = () => {
    if(isPaused) return;
    timeLeft--;
    if(timeLeft <= 3 && timeLeft > 0) playTone(440, 0.1);
    if(timeLeft <= 0) {
      playTone(880, 0.4);
      nextPhase();
    }
    render();
  };

  const nextPhase = () => {
    if (isCooldown) {
      clearInterval(timer);
      alert("Workout Complete!");
      location.reload();
      return;
    }

    if (!isWorkPhase) {
      // REST -> WORK
      isWorkPhase = true;
      timeLeft = workGoal;
    } else {
      // WORK -> REST/COOLDOWN
      curCycle++;
      isWorkPhase = false;

      if (curCycle < RESTS.length) {
        timeLeft = (RESTS[curCycle] + 30) - workGoal;
      } else {
        isCooldown = true;
        timeLeft = 180; // 3 minutes strictly
      }
    }
  };

  const render = () => {
    const isWarmup = (curCycle === 0 && !isWorkPhase);
    const bg = (isWorkPhase) ? 'var(--work-red)' : 'var(--rest-green)';
    document.getElementById('run-view').style.backgroundColor = bg;

    let phaseNameStr = "REST";
    if (isWarmup) phaseNameStr = "WARMUP";
    else if (isCooldown) phaseNameStr = "COOLDOWN";
    else if (isWorkPhase) phaseNameStr = "WORK";

    document.getElementById('phase-name').innerText = phaseNameStr;

    let displayCycle = curCycle + 1;
    if (isCooldown) displayCycle = RESTS.length;
    document.getElementById('cycle-count').innerText = `${displayCycle} / ${RESTS.length}`;

    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2, '0')}`;
  };

  ffBtn.onclick = () => {
    if (timeLeft > 3) {
      timeLeft = 3;
      render();
    } else {
      timeLeft = 0;
      tick();
    }
  };

  document.getElementById('pause-btn').onclick = () => {
    isPaused = !isPaused;
    document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE";
  };

  document.getElementById('return-btn').onclick = () => { if(confirm("Quit?")) location.reload(); };

  const exportCSV = () => {
    let csv = "Date,Goal,Rests\n" + history.map(h => {
      const restsStr = h.rests ? `"${h.rests.join(',')}"` : "[]";
      return `${h.date},${h.goal},${restsStr}`;
    }).join("\n");

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'hiit_history.csv'; a.click();
  };

  updateLaunch();
</script>
</body>
</html>
