<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HIIT Pro: Deep Recall</title>
  <style>
    :root { --bg: #050505; --card: #121212; --peak: #ff4757; --trough: #2ed573; --delta: #54a0ff; --text: #eee; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; overflow: hidden; }
    .container { display: flex; flex-direction: column; height: 100vh; padding: 1rem; box-sizing: border-box; gap: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; height: 80px; }
    .live-hr { font-size: 5rem; font-weight: 800; tabular-nums: true; color: #fff; line-height: 1; }
    .grid-wrapper { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid #333; flex-shrink: 0; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1400px; font-size: 0.85rem; }
    th, td { border: 1px solid #222; text-align: center; padding: 6px 2px; height: 45px; }
    .label-col { width: 110px; font-weight: bold; background: #1a1a1a; position: sticky; left: 0; z-index: 10; color: #888; text-align: left; padding-left: 10px; font-size: 0.7rem; }
    .peak-val { color: var(--peak); font-size: 1.5rem; font-weight: bold; }
    .trough-val { color: var(--trough); font-size: 1.5rem; font-weight: bold; }
    .is-active { background: rgba(255, 255, 255, 0.12); outline: 2px solid #777; }
    .graph-container { flex-grow: 1; background: #000; border: 1px solid #222; border-radius: 8px; position: relative; overflow: hidden; }
    .graph-svg { width: 100%; height: 100%; display: block; }
    .y-label { position: absolute; left: 5px; font-size: 0.65rem; color: #777; background: rgba(0,0,0,0.7); padding: 2px; z-index: 5; }
    button { background: var(--trough); color: black; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-stop { background: #ff4757; color: white; }
    .comp-nav { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; justify-content: center; align-items: center; gap: 20px; }
    .nav-arrow { cursor: pointer; background: #333; padding: 10px 20px; border-radius: 4px; font-weight: bold; user-select: none; }
    .disabled { opacity: 0.1; cursor: default; }
    .view-indicator { font-size: 0.7rem; color: var(--delta); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
  import { h, render, useState, useEffect, useRef, html } from 'https://unpkg.com/htm/preact/standalone.module.js';

  const DB_NAME = "HIITAnalyzerDB";
  // Define a variable to hold the sentinel
  let wakeLock = null;

  const requestWakeLock = async () => {
    try {
      // Check if the API is supported
      if ('wakeLock' in navigator) {
        // Request the lock
        wakeLock = await navigator.wakeLock.request('screen');

        console.log('✅ Wake Lock is active. Screen will stay on.');

        // Listen for the lock being released (e.g., by the OS or switching tabs)
        wakeLock.addEventListener('release', () => {
          console.log('⚠️ Wake Lock was released.');
        });
      } else {
        console.warn('Wake Lock API not supported in this browser.');
      }
    } catch (err) {
      console.error(`${err.name}, ${err.message}`);
    }
  };

  // IMPORTANT: Re-request the lock if the app comes back from the background
  const handleVisibilityChange = async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
      await requestWakeLock();
    }
  };

  document.addEventListener('visibilitychange', handleVisibilityChange);

  const initDB = () => new Promise((res) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("sessions")) db.createObjectStore("sessions", { keyPath: "date" });
      if (!db.objectStoreNames.contains("raw_data")) db.createObjectStore("raw_data", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = () => res(req.result);
  });

  function App() {
    const [db, setDb] = useState(null);
    const [hr, setHr] = useState(0);
    const [status, setStatus] = useState('IDLE'); // IDLE, RUNNING

    // SESSION DATA
    const [liveIntervals, setLiveIntervals] = useState(Array.from({ length: 13 }, () => ({ peak: 0, trough: 0 })));
    const [liveGraph, setLiveGraph] = useState([]);
    const [currentIdx, setCurrentIdx] = useState(-1);
    const [phase, setPhase] = useState('PEAK');

    // HISTORY NAVIGATION
    const [history, setHistory] = useState([]); // Array of session objects
    const [viewIdx, setViewIdx] = useState(-1); // -1 is Live, 0 is most recent, 1 is older...
    const [viewedGraph, setViewedGraph] = useState([]);

    const sessionDate = useRef(new Date().toLocaleString()).current;
    const stateRef = useRef();
    const bluetoothRef = useRef(null);
    const startTime = useRef(Date.now());

    useEffect(() => {
      stateRef.current = { hr, currentIdx, phase, liveIntervals, status };
    }, [hr, currentIdx, phase, liveIntervals, status]);

    useEffect(() => {
      initDB().then(d => {
        setDb(d);
        refreshHistory(d);
      });
    }, []);

    // CRITICAL: Load raw data when navigating history
    useEffect(() => {
      if (!db || viewIdx === -1) return;
      const targetSession = history[viewIdx];
      if (!targetSession) return;

      const tx = db.transaction("raw_data", "readonly");
      const store = tx.objectStore("raw_data");
      const points = [];
      store.openCursor().onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          if (cursor.value.date === targetSession.date) points.push(cursor.value);
          cursor.continue();
        } else {
          setViewedGraph(points);
        }
      };
    }, [viewIdx, history, db]);

    const refreshHistory = (d) => {
      const tx = d.transaction("sessions", "readonly");
      tx.objectStore("sessions").getAll().onsuccess = (e) => {
        const logs = e.target.result
                .filter(s => s.type !== 'mock')
                .sort((a, b) => b.date.localeCompare(a.date));
        setHistory(logs);
      };
    };

    const processHR = (newBpm) => {
      const s = stateRef.current;
      if (s.status !== 'RUNNING') return;

      setHr(newBpm);
      setLiveGraph(prev => [...prev, { bpm: newBpm }]);

      if (db) {
        const tx = db.transaction("raw_data", "readwrite");
        tx.objectStore("raw_data").add({ date: sessionDate, timestamp: Date.now(), bpm: newBpm });
      }

      if (s.currentIdx === -1) {
        if (Date.now() - startTime.current < 60000) return;
        setCurrentIdx(0); return;
      }

      if (s.currentIdx < 13) {
        const next = [...s.liveIntervals];
        const data = next[s.currentIdx];
        const thresh = (s.currentIdx <= 3) ? 10 : 4;

        if (s.phase === 'PEAK') {
          if (newBpm > data.peak) data.peak = newBpm;
          if (newBpm <= data.peak - thresh) { setPhase('TROUGH'); data.trough = newBpm; }
        } else {
          if (newBpm < data.trough || data.trough === 0) data.trough = newBpm;
          if (newBpm >= data.trough + thresh && s.currentIdx < 12) {
            setCurrentIdx(s.currentIdx + 1); setPhase('PEAK'); next[s.currentIdx + 1].peak = newBpm;
          }
        }
        setLiveIntervals(next);
        const txS = db.transaction("sessions", "readwrite");
        txS.objectStore("sessions").put({ date: sessionDate, intervals: next, type: 'live' });
      }
    };

    const connect = async () => {
      const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
      const server = await device.gatt.connect();
      await requestWakeLock();
      const service = await server.getPrimaryService('heart_rate');
      const char = await service.getCharacteristic('heart_rate_measurement');
      await char.startNotifications();
      char.addEventListener('characteristicvaluechanged', e => processHR(e.target.value.getUint8(1)));
      setStatus('RUNNING'); setViewIdx(-1); startTime.current = Date.now();
    };

    // DATA RESOLUTION
    const isViewingLive = viewIdx === -1;
    const currentData = isViewingLive ? liveIntervals : history[viewIdx].intervals;
    const currentPoints = isViewingLive ? liveGraph : viewedGraph;
    const displayDate = isViewingLive ? sessionDate : history[viewIdx].date;

    // Delta helpers
    const getDelta = (d) => (d && d.peak && d.trough) ? d.peak - d.trough : null;

    // Comparison logic: Compare what we are VIEWING vs the session BEFORE IT in history
    const compSession = history[isViewingLive ? 0 : viewIdx + 1] || null;

    return html`
                <div class="container">
                    <div class="header">
                        <div class="controls">
                            ${status === 'IDLE' ? html`<button onclick=${connect}>CONNECT HR</button>` : html`<button onclick=${() => window.location.reload()}>RESET</button>`}
                        </div>
                        <div style="text-align:right">
                            <div class="view-indicator">${isViewingLive ? '● Live Session' : '▼ Historical Review'}</div>
                            <div class="live-hr">${hr || '--'}</div>
                        </div>
                    </div>

                    <div class="grid-wrapper">
                        <table>
                            <thead><tr><th class="label-col">INTERVAL</th>${Array.from({length:13}).map((_,i)=>html`<th>${i+1}</th>`)}</tr></thead>
                            <tbody>
                                <tr><td class="label-col">PEAK</td>${currentData.map((d,i)=>html`<td class="${isViewingLive && currentIdx===i && phase==='PEAK'?'is-active':''} peak-val">${d.peak||'--'}</td>`)}</tr>
                                <tr><td class="label-col">TROUGH</td>${currentData.map((d,i)=>html`<td class="${isViewingLive && currentIdx===i && phase==='TROUGH'?'is-active':''} trough-val">${d.trough||'--'}</td>`)}</tr>
                                <tr style="background:#0f172a"><td class="label-col">DELTA</td>${currentData.map(d=>html`<td style="color:var(--delta); font-weight:bold">${getDelta(d)||'--'}</td>`)}</tr>
                                <tr style="background:#1a1a1a"><td class="label-col">VS PREV</td>${currentData.map((d,i)=>{
      const cd = getDelta(d);
      const pd = compSession ? getDelta(compSession.intervals[i]) : null;
      const diff = (cd !== null && pd !== null) ? cd - pd : null;
      return html`<td style="color:${diff > 0 ? '#2ed573' : diff < 0 ? '#ff4757' : '#666'}">${diff !== null ? (diff > 0 ? '+' + diff : diff) : '--'}</td>`;
    })}</tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="graph-container">
                        ${currentPoints.length > 1 && (() => {
      const b = currentPoints.map(p => p.bpm);
      const min = Math.min(...b) - 5, max = Math.max(...b) + 5;
      const pts = currentPoints.map((p, i) => `${(i/(currentPoints.length-1))*2000},${200-((p.bpm-min)/(max-min)*200)}`).join(' ');
      return html`
                                <div class="y-label" style="top:0">${Math.round(max)}</div>
                                <div class="y-label" style="bottom:0">${Math.round(min)}</div>
                                <svg viewBox="0 0 2000 200" preserveAspectRatio="none" class="graph-svg">
                                    <polyline fill="none" stroke="${isViewingLive ? (phase==='PEAK'?'var(--peak)':'var(--trough)') : 'var(--delta)'}" stroke-width="3" points="${pts}" />
                                </svg>
                            `;
    })()}
                    </div>

                    <div class="comp-nav">
                        <div class="nav-arrow ${viewIdx >= history.length - 1 ? 'disabled' : ''}" onclick=${() => setViewIdx(prev => Math.min(history.length - 1, prev + 1))}>PREV</div>
                        <div style="text-align:center">
                            <div style="font-weight:bold; font-size: 0.9rem">${displayDate}</div>
                            ${!isViewingLive && html`<div onclick=${() => setViewIdx(-1)} style="color:var(--delta); cursor:pointer; font-size:0.7rem; margin-top:4px">[ RETURN TO LIVE ]</div>`}
                        </div>
                        <div class="nav-arrow ${viewIdx <= -1 ? 'disabled' : ''}" onclick=${() => setViewIdx(prev => Math.max(-1, prev - 1))}>NEXT</div>
                    </div>
                </div>
            `;
  }
  render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
