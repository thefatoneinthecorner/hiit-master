<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HIIT Dashboard Pro: High Fidelity</title>
  <style>
    :root {
      --bg: #050505; --card: #121212; --work: #d32f2f;
      --rest: #388e3c; --text: #eee; --accent: #54a0ff;
    }
    body, html {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden; user-select: none;
    }

    .app-container { display: flex; flex-direction: row; height: 100vh; width: 100vw; }

    /* --- LEFT PANEL --- */
    .timer-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden;
      min-width: 250px;
    }
    .scaler {
      display: flex; flex-direction: column; align-items: center;
      transform-origin: center; transition: transform 0.05s linear; width: 100%;
    }

    /* Digit Cell Styling with Gaps */
    .digit-row { display: flex; align-items: center; font-weight: 900; line-height: 1; gap: 12px; }
    .digit-box {
      width: 0.72em; text-align: center; display: inline-block;
      background: rgba(255,255,255,0.06); border-radius: 8px;
      padding: 5px 0; border: 1px solid rgba(255,255,255,0.05);
    }
    .colon-box { width: 0.3em; text-align: center; font-weight: 900; color: inherit; }

    .timer-display { font-size: 10rem; }
    .hr-display { font-size: 8rem; font-weight: 900; color: #fff; margin-top: 10px; }
    .hr-label { font-size: 1.1rem; color: var(--accent); font-weight: bold; letter-spacing: 5px; margin-top: 25px; }
    .phase-label { font-size: 1.6rem; letter-spacing: 0.5rem; font-weight: bold; text-transform: uppercase; margin-bottom: 20px;}
    .cycle-info { position: absolute; top: 30px; font-weight: bold; opacity: 0.4; font-size: 1.1rem; }

    .resizer { width: 10px; cursor: col-resize; background: #1a1a1a; z-index: 10; border-left: 1px solid #333; }
    .resizer:hover, .resizer.dragging { background: var(--accent); }

    /* --- RIGHT PANEL --- */
    .data-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .table-wrapper { background: #111; overflow-x: auto; border-bottom: 1px solid #333; }
    table { width: 100%; border-collapse: collapse; min-width: 950px; font-size: 0.75rem; table-layout: fixed; }
    th, td { border: 1px solid #222; text-align: center; padding: 6px 2px; height: 38px; }
    .label-col { width: 115px; background: #1a1a1a; position: sticky; left: 0; font-weight: bold; text-align: left; padding-left: 12px; color: #888; z-index: 5; }

    .peak-val { color: var(--work); font-weight: bold; }
    .trough-val { color: var(--rest); font-weight: bold; }
    .calc-row { background: rgba(84, 160, 255, 0.04); }
    .diff-alert { outline: 2px solid var(--work); outline-offset: -2px; background: rgba(211, 47, 47, 0.15) !important; }

    .tweak-panel { background: #161616; padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
    .control-row { display: flex; align-items: center; gap: 15px; font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
    input[type=range] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; height: 25px; }
    .val-badge { font-weight: bold; color: #fff; background: #333; padding: 4px 10px; border-radius: 4px; min-width: 40px; text-align: center; }

    .graph-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }
    .graph-svg { width: 100%; height: 100%; display: block; }

    .history-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #000; border-top: 1px solid #333;
    }
    .nav-btn { background: #222; color: white; border: 1px solid #444; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    .skip-btn { background: #f39c12; color: #000; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
  import { h, render, useState, useEffect, useRef, html } from 'https://unpkg.com/htm/preact/standalone.module.js';

  const DB_NAME = "HIITAnalyzerDB";
  const RESTS = [300, 90, 75, 60, 45, 35, 30, 30, 30, 30, 30, 30, 30];

  const getPhaseAtTime = (seconds, goal, offset) => {
    const t = seconds - offset;
    let elapsed = 0;
    elapsed += RESTS[0]; if (t < elapsed) return 'warmup';
    for (let i = 1; i <= 13; i++) {
      elapsed += goal; if (t < elapsed) return 'work';
      const baseRest = (i < 13) ? (RESTS[i] || 30) : 180;
      elapsed += (baseRest + 30 - goal); if (t < elapsed) return 'rest';
    }
    return 'cooldown';
  };

  function App() {
    const [db, setDb] = useState(null);
    const [status, setStatus] = useState('IDLE');
    const [hr, setHr] = useState(0);
    const [timeLeft, setTimeLeft] = useState(0);
    const [isWork, setIsWork] = useState(false);
    const [cycle, setCycle] = useState(0); // 0 = Warmup, 1-13 = Rounds
    const [workGoal, setWorkGoal] = useState(25);
    const [offset, setOffset] = useState(0);

    const [viewIdx, setViewIdx] = useState(-1);
    const [viewPoints, setViewPoints] = useState([]);
    const [livePoints, setLivePoints] = useState([]);
    const [sessions, setSessions] = useState([]);
    const [scrubData, setScrubData] = useState(null);
    const [liveIntervals, setLiveIntervals] = useState(Array.from({ length: 13 }, () => ({ peak: 0, trough: 0 })));

    const [panelWidth, setPanelWidth] = useState(480);
    const [isDragging, setIsDragging] = useState(false);

    const graphRef = useRef(null);
    const audioCtx = useRef(null);
    const master = useRef(null);
    const liveStartTs = useRef(null);
    const activeDate = useRef(null);

    const playTone = (freq, len) => {
      if (!audioCtx.current) {
        audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        master.current = audioCtx.current.createDynamicsCompressor();
        master.current.connect(audioCtx.current.destination);
      }
      const t0 = audioCtx.current.currentTime;
      const osc = audioCtx.current.createOscillator();
      const g = audioCtx.current.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t0);
      osc.connect(g); g.connect(master.current);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.2, t0 + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + len);
      osc.start(t0); osc.stop(t0 + len + 0.05);
    };

    useEffect(() => {
      const onMove = (e) => isDragging && setPanelWidth(Math.max(250, Math.min(e.clientX, window.innerWidth - 450)));
      const onUp = () => setIsDragging(false);
      window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
      return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    }, [isDragging]);

    const scaleFactor = Math.min(1.1, panelWidth / 550);

    useEffect(() => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onsuccess = () => { setDb(req.result); loadSessions(req.result); };
    }, []);

    const loadSessions = (d) => {
      const tx = d.transaction("sessions", "readonly");
      tx.objectStore("sessions").getAll().onsuccess = (e) => {
        setSessions((e.target.result || []).sort((a,b) => b.date.localeCompare(a.date)));
      };
    };

    useEffect(() => {
      if (!db || viewIdx === -1) return;
      const s = sessions[viewIdx]; if (!s) return;
      const pts = [];
      db.transaction("raw_data", "readonly").objectStore("raw_data").openCursor().onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) { if (cursor.value.date === s.date) pts.push(cursor.value); cursor.continue(); }
        else { setViewPoints([...pts].sort((a,b) => a.timestamp - b.timestamp)); }
      };
    }, [viewIdx, sessions, db]);

    // Timer Engine
    useEffect(() => {
      if (status === 'RUNNING' && timeLeft > 0) {
        const t = setInterval(() => {
          if (timeLeft <= 4) playTone(1760, 0.1); // 4, 3, 2, 1 beeps
          setTimeLeft(prev => prev - 1);
        }, 1000);
        return () => clearInterval(t);
      } else if (status === 'RUNNING' && timeLeft === 0) {
        playTone(1760, 0.4);
        if (!isWork) {
          setIsWork(true);
          setTimeLeft(workGoal);
          // When entering Work, if we're past warmup, we're starting a new round's Peak search
          if (cycle === 0) setCycle(1);
          else if (cycle < 13) setCycle(c => c + 1);
        }
        else {
          setIsWork(false);
          const n = cycle;
          if (n <= 13) {
            const baseRest = (n < 13) ? (RESTS[n] || 30) : 180;
            setTimeLeft(baseRest + 30 - workGoal);
          }
          if (n === 13 && !isWork) { setStatus('FINISHED'); loadSessions(db); }
        }
      }
    }, [status, timeLeft, isWork, workGoal, cycle]);

    // HR & ACTUAL Table Update
    useEffect(() => {
      if (status === 'RUNNING' && db && hr > 0) {
        const now = Date.now();
        const p = { date: activeDate.current, bpm: hr, timestamp: now };
        setLivePoints(prev => [...prev, p]);
        db.transaction("raw_data", "readwrite").objectStore("raw_data").add(p);

        // --- CORRECTED PHYSIOLOGICAL TRACKING ---
        if (cycle > 0 && cycle <= 13) {
          setLiveIntervals(prev => {
            const next = [...prev];
            const currentRoundIdx = cycle - 1;

            // 1. Peak Round N: Track during Work N and Rest N
            if (hr > next[currentRoundIdx].peak) next[currentRoundIdx].peak = hr;

            // 2. Trough Round N: Track during Rest N and following Work N+1
            // If we are in Rest N:
            if (!isWork) {
              if (hr < next[currentRoundIdx].trough || next[currentRoundIdx].trough === 0) {
                next[currentRoundIdx].trough = hr;
              }
            }
            // If we are in Work N+1 (which is 'cycle' when isWork is true, but for Trough N we need cycle-1):
            if (isWork && currentRoundIdx > 0) {
              const prevRoundIdx = currentRoundIdx - 1;
              if (hr < next[prevRoundIdx].trough || next[prevRoundIdx].trough === 0) {
                next[prevRoundIdx].trough = hr;
              }
            }

            return next;
          });
        }
      }
    }, [timeLeft, hr, cycle, isWork]);

    // ATOMIC SYNC FAST FORWARD
    const fastForward = () => {
      if (status !== 'RUNNING' || timeLeft <= 5) return;
      const skipMs = (timeLeft - 5) * 1000;

      // Atomic shift: move start AND all existing points back together
      liveStartTs.current -= skipMs;

      setLivePoints(prev => {
        const shifted = prev.map(p => ({ ...p, timestamp: p.timestamp - skipMs }));
        const now = Date.now();
        const lastTs = shifted.length > 0 ? shifted[shifted.length-1].timestamp : (now - skipMs);
        const fillPoints = [];
        for (let i = 1000; i <= skipMs; i += 1000) {
          fillPoints.push({ date: activeDate.current, bpm: hr || 60, timestamp: lastTs + i });
        }
        const tx = db.transaction("raw_data", "readwrite");
        fillPoints.forEach(p => tx.objectStore("raw_data").add(p));
        return [...shifted, ...fillPoints];
      });

      setTimeLeft(5);
    };

    const activePoints = viewIdx === -1 ? livePoints : viewPoints;
    const T_Zero = viewIdx === -1 ? liveStartTs.current : new Date(sessions[viewIdx]?.date).getTime();
    const T_End = viewIdx === -1 ? Date.now() : (activePoints.length > 0 ? activePoints[activePoints.length - 1].timestamp : T_Zero + 1);
    const Total_Range = Math.max(1, T_End - T_Zero);
    const Total_Sec = Total_Range / 1000;

    const bpms = activePoints.map(p => p.bpm);
    const minHR = bpms.length ? Math.min(...bpms) - 3 : 50;
    const maxHR = bpms.length ? Math.max(...bpms) + 3 : 180;

    const renderDigits = (val, isTime) => {
      let digits = [];
      if (isTime) {
        const m = Math.floor(val / 60).toString();
        const s = (val % 60).toString().padStart(2, '0');
        digits = [...m, ':', ...s];
      } else { digits = (val || '--').toString().split(''); }
      return html`<div class="digit-row">${digits.map(d => d === ':' ? html`<span class="colon-box">:</span>` : html`<span class="digit-box">${d}</span>`)}</div>`;
    };

    const stats = (() => {
      const res = Array(13).fill({ peak: 0, trough: 0 });
      if (activePoints.length < 2 || !T_Zero) return res;
      let elapsed = 0; const pts = activePoints.map(p => ({ ...p, sec: (p.timestamp - T_Zero) / 1000 }));
      elapsed += RESTS[0];
      for (let i = 1; i <= 13; i++) {
        const wEnd = elapsed + offset + workGoal;
        const rEnd = wEnd + ((RESTS[i] || 30) + 30 - workGoal);
        const nextWEnd = rEnd + workGoal;
        const recPts = pts.filter(p => p.sec >= wEnd && p.sec <= rEnd).map(p => p.bpm);
        const trPts = pts.filter(p => p.sec >= wEnd && p.sec <= nextWEnd).map(p => p.bpm);
        res[i-1] = { peak: recPts.length ? Math.max(...recPts) : 0, trough: trPts.length ? Math.min(...trPts) : 0 };
        elapsed += workGoal + ((RESTS[i] || 30) + 30 - workGoal);
      }
      return res;
    })();

    const currentActual = viewIdx === -1 ? liveIntervals : (sessions[viewIdx]?.intervals || Array(13).fill({ peak: 0, trough: 0 }));

    return html`
      <div class="app-container">
        <div class="timer-panel" style="width: ${panelWidth}px; background: ${isWork && viewIdx === -1 ? 'var(--work)' : '#000'}">
          <div class="cycle-info">${viewIdx === -1 ? (status === 'IDLE' ? 'READY' : `ROUND ${cycle} / 13`) : 'RECALL MODE'}</div>

          <div class="scaler" style="transform: scale(${scaleFactor})">
            <div class="phase-label">${viewIdx === -1 ? (status === 'IDLE' ? 'STANDBY' : (isWork ? 'WORK' : 'REST')) : 'HISTORY'}</div>
            <div class="timer-display">${renderDigits(viewIdx === -1 ? timeLeft : 0, true)}</div>
            <div class="hr-label">HEART RATE</div>
            <div class="hr-display">${renderDigits(hr, false)}</div>
            ${status === 'RUNNING' && viewIdx === -1 && html`<button class="skip-btn" onclick=${fastForward}>⏩ JUMP TO -5S</button>`}
          </div>
        </div>

        <div class="resizer ${isDragging?'dragging':''}" onMouseDown=${() => setIsDragging(true)}></div>

        <div class="data-panel">
          <div class="table-wrapper">
            <table>
              <thead><tr><th class="label-col">ROUND</th>${Array.from({length:13}).map((_,i)=>html`<th>${i+1}</th>`)}</tr></thead>
              <tbody>
              <tr><td class="label-col">ACTUAL PEAK</td>${currentActual.map(s => html`<td>${s.peak || '--'}</td>`)}</tr>
              <tr class="calc-row"><td class="label-col">CALC PEAK</td>${stats.map((s, i) => html`<td class="peak-val ${viewIdx!==-1 && s.peak!==currentActual[i]?.peak?'diff-alert':''}">${s.peak || '--'}</td>`)}</tr>
              <tr><td class="label-col">ACTUAL TR</td>${currentActual.map(s => html`<td>${s.trough || '--'}</td>`)}</tr>
              <tr class="calc-row"><td class="label-col">CALC TR</td>${stats.map((s, i) => html`<td class="trough-val ${viewIdx!==-1 && s.trough!==currentActual[i]?.trough?'diff-alert':''}">${s.trough || '--'}</td>`)}</tr>
              </tbody>
            </table>
          </div>

          <div class="tweak-panel">
            <div class="control-row"><span>Work Goal</span><input type="range" min="15" max="45" value=${workGoal} onInput=${e => setWorkGoal(parseInt(e.target.value))} /><span class="val-badge">${workGoal}s</span></div>
            ${viewIdx !== -1 && html`<div class="control-row"><span>Offset</span><input type="range" min="-40" max="40" value=${offset} onInput=${e => setOffset(parseInt(e.target.value))} /><span class="val-badge">${offset}s</span></div>`}
          </div>

          <div class="graph-container" ref=${graphRef} onMouseMove=${(e) => {
            if(!activePoints.length || !T_Zero || !graphRef.current) return;
            const rect = graphRef.current.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const closest = activePoints.reduce((p, c) => Math.abs((c.timestamp-T_Zero)/1000 - pct*Total_Sec) < Math.abs((p.timestamp-T_Zero)/1000 - pct*Total_Sec) ? c : p);
            setScrubData({ x: e.clientX - rect.left, bpm: closest.bpm, time: (closest.timestamp - T_Zero) / 1000 });
          }} onMouseLeave=${() => setScrubData(null)}>
            ${scrubData && html`<div class="scrubber-info">T: ${Math.floor(scrubData.time/60)}:${Math.floor(scrubData.time%60).toString().padStart(2,'0')} | ${scrubData.bpm} BPM</div>`}
            <svg class="graph-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
              ${(() => {
                if(!T_Zero || Total_Sec <= 0) return null;
                const rects = []; const segs = 300; const sw = Total_Sec / segs;
                for(let i=0; i<segs; i++) {
                  const s = i * sw; const p = getPhaseAtTime(s, workGoal, offset);
                  rects.push(html`<rect x="${(s/Total_Sec)*1000}" y="0" width="${(sw/Total_Sec)*1000 + 0.1}" height="100" fill="${{warmup:'rgba(255,255,255,0.04)',work:'rgba(211,47,47,0.3)',rest:'rgba(56,142,60,0.1)',cooldown:'rgba(84,160,255,0.04)'}[p]}" />`);
                }
                return rects;
              })()}
              <polyline fill="none" stroke="white" stroke-width="2" points="${activePoints.map(p => `${((p.timestamp-T_Zero)/(Total_Sec*1000))*1000},${100-((p.bpm-minHR)/(maxHR-minHR)*100)}`).join(' ')}" />
            </svg>
          </div>

          <div class="history-nav">
            <button class="nav-btn" onclick=${() => setViewIdx(v => Math.min(sessions.length - 1, v + 1))}>PREV</button>
            ${viewIdx === -1
                    ? html`<button class="nav-btn" style="background:var(--rest);color:#000" onclick=${async () => {
                      try {
                        const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                        const srv = await dev.gatt.connect();
                        const chr = await (await srv.getPrimaryService('heart_rate')).getCharacteristic('heart_rate_measurement');
                        await chr.startNotifications();
                        chr.addEventListener('characteristicvaluechanged', (e) => setHr(e.target.value.getUint8(1)));
                        liveStartTs.current = Date.now(); activeDate.current = new Date().toLocaleString();
                        setLivePoints([]); setCycle(0); setStatus('RUNNING'); setTimeLeft(RESTS[0]); setLiveIntervals(Array.from({ length: 13 }, () => ({ peak: 0, trough: 0 })));
                        db.transaction("sessions", "readwrite").objectStore("sessions").put({ date: activeDate.current, workGoal, offset, intervals: [] });
                      } catch(e) { if(confirm("Start?")) { liveStartTs.current = Date.now(); activeDate.current = new Date().toLocaleString(); setLivePoints([]); setStatus('RUNNING'); setTimeLeft(RESTS[0]); } }
                    }}>START LIVE</button>`
                    : html`<button class="nav-btn" style="background:var(--accent);color:#000" onclick=${() => {
                      db.transaction("sessions", "readwrite").objectStore("sessions").put({ ...sessions[viewIdx], workGoal, offset, intervals: stats });
                      alert("Database Updated!"); refreshSessions(db);
                    }}>SAVE AS ACTUAL</button>`
            }
            <button class="nav-btn" style="color:${viewIdx === -1 ? 'var(--accent)' : 'white'}" onclick=${() => setViewIdx(-1)}>LIVE VIEW</button>
            <button class="nav-btn" onclick=${() => setViewIdx(v => Math.max(-1, v - 1))}>NEXT</button>
          </div>
        </div>
      </div>
    `;
  }
  render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
